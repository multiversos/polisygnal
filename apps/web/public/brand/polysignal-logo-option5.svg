<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PolySignal logo</title>
  <desc id="desc">Logo horizontal de PolySignal con icono geométrico tipo P, barras de datos y texto PolySignal.</desc>
  <defs>
    <linearGradient id="ps-gradient" x1="95" y1="70" x2="315" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#18E0D1"/>
      <stop offset="0.45" stop-color="#20D982"/>
      <stop offset="1" stop-color="#7B4DFF"/>
    </linearGradient>
    <linearGradient id="text-gradient" x1="490" y1="160" x2="900" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.48" stop-color="#24D47A"/>
      <stop offset="1" stop-color="#7B4DFF"/>
    </linearGradient>
    <filter id="soft-shadow" x="0" y="0" width="400" height="400" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
  </defs>

  <g filter="url(#soft-shadow)">
    <path d="M205 50L315 113V245L205 310L95 245V113L205 50Z" stroke="url(#ps-gradient)" stroke-width="24" stroke-linejoin="round"/>
    <path d="M143 277V124H213C268 124 301 154 301 198C301 241 268 271 213 271H178V277H143Z" fill="#0B1220"/>
    <path d="M166 248V146H211C250 146 275 166 275 198C275 230 250 249 211 249H166Z" fill="url(#ps-gradient)" opacity="0.95"/>
    <path d="M189 224V170H215C238 170 252 180 252 198C252 216 238 224 215 224H189Z" fill="#0B1220" opacity="0.92"/>
    <rect x="122" y="238" width="22" height="46" rx="6" fill="#20D982"/>
    <rect x="154" y="215" width="22" height="69" rx="6" fill="#22D3EE"/>
    <rect x="186" y="192" width="22" height="92" rx="6" fill="#7B4DFF"/>
  </g>

  <text x="390" y="198" font-family="Inter, Montserrat, Arial, sans-serif" font-size="88" font-weight="800" letter-spacing="-3" fill="#F8FAFC">Poly</text>
  <text x="580" y="198" font-family="Inter, Montserrat, Arial, sans-serif" font-size="88" font-weight="800" letter-spacing="-3" fill="url(#text-gradient)">Signal</text>
  <text x="395" y="262" font-family="Inter, Montserrat, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="8" fill="#94A3B8">DEPORTES · DATOS · MERCADOS</text>
</svg>
