name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: polysignal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        working-directory: apps/api
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations
        working-directory: apps/api
        env:
          POLYSIGNAL_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/polysignal_test
        run: python -m alembic upgrade head

      - name: Run tests
        working-directory: apps/api
        env:
          POLYSIGNAL_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/polysignal_test
          ODDS_API_KEY: dummy_key_for_ci
        run: python -m pytest -v

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        working-directory: apps/api
        run: ruff check .

  typecheck-web:
    name: TypeScript check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        working-directory: apps/web
        run: npx tsc --noEmit
