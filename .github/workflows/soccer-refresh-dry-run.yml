name: Soccer Existing Refresh Dry Run

on:
  # Manual only. Do not add schedule here without an explicit supervised rollout.
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum existing soccer markets to include in the dry-run report"
        required: false
        default: "25"
      stale_hours:
        description: "Hours before an existing market is considered stale"
        required: false
        default: "48"

jobs:
  dry-run:
    name: Existing soccer refresh dry-run
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API dependencies
        working-directory: apps/api
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run read-only soccer refresh dry-run
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.POLYSIGNAL_NEON_DATABASE_URL }}
          POLYSIGNAL_ENV: production
        run: |
          # Safety constraints:
          # - dry-run only
          # - no --apply
          # - no --yes-i-understand-this-writes-data
          # - no --delete-existing
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::POLYSIGNAL_NEON_DATABASE_URL secret is not configured."
            exit 1
          fi
          mkdir -p ../../reports
          python -m app.commands.check_database_config --connect
          python -m app.commands.refresh_existing_soccer_markets \
            --limit "${{ github.event.inputs.limit }}" \
            --stale-hours "${{ github.event.inputs.stale_hours }}" \
            --report-json ../../reports/existing-soccer-refresh-dry-run.json \
            --json

      - name: Upload dry-run report
        uses: actions/upload-artifact@v4
        with:
          name: existing-soccer-refresh-dry-run
          path: reports/existing-soccer-refresh-dry-run.json
          if-no-files-found: error
